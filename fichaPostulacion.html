<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>DevJobs - Ficha de Postulación</title>
    <style>
        body {
            font-family: "Inter", sans-serif;
        }
        .btn-guardar {
            background-color: #53b63f; 
            color: white; 
            border-radius: 10px; 
            border: 1px solid #53b63f;
            padding: 10px 25px; 
            text-align: center; 
            display: inline-block; 
            font-size: 14px; 
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html">← Volver a ofertas</a>
    </nav>

    <h1>Ficha de Postulación</h1>

    <p style="color: rgb(231, 153, 56);">Puesto: Frontend Developer Trainee</p>

    <main>
        <form action="">
            <!--Primer field set-->
            <fieldset>
                <legend style="color: blue;"><b>Datos Personales</b></legend>
                <label for="nombre">Nombre Completo: </label>
                <br>
                <input type="text" id="nombre" placeholder="Tu nombre aquí" required
                    oninvalid="this.setCustomValidity('No olvides tu nombre')" oninput="this.setCustomValidity('')">

                <br><br>
                
                <label for="correo">Correo Electronico: </label>
                <br>
                <input type="email" id="correo" placeholder="Tu correo aquí" required
                    oninvalid="this.setCustomValidity('No olvides tu correo')" oninput="this.setCustomValidity('')">

                <br><br>

                <label for="telefono">Teléfono:</label>
                <br>
                <input type="tel" id="telefono" placeholder="Tu teléfono aquí" required
                    oninvalid="this.setCustomValidity('No olvides tu teléfono')" oninput="this.setCustomValidity('')">
            </fieldset>

            <!--Segundo fieldSet-->
            <fieldset>
                <legend style="color: blue;"><b>Perfil Técnico</b></legend>
                <label for="github">Link de GitHub: </label>
                <br>
                <input type="url" id="github" placeholder="https://github.com/usuario" required
                    oninvalid="this.setCustomValidity('No olvides tu link')" oninput="this.setCustomValidity('')">

                <br><br>

                <label for="ingles">Nivel de Inglés </label>
                <br>
                <select name="ingles" id="ingles">
                    <option value="">Seleccionar</option>
                    <option value="">Básico</option>
                    <option value="">Intermedio</option>
                    <option value="">Avanzado</option>
                </select>

                <br><br>

                <input type="checkbox" id="html"><label for="html">HTML</label>
                <input type="checkbox" id="css"><label for="css">CSS3</label>
                <input type="checkbox" id="js"><label for="js">JavaScript</label>
            </fieldset>

            <button type="submit" class="btn-guardar">
                <i class="bi bi-rocket-takeoff"></i> Guardar
            </button>
        </form>
    </main>
</body>

</html>
