<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com"
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>DevJobs</title>
    <title>Ficha de Postulación</title>
</head>
<style>
    body{
        font-family: "Inter", sans-serif;
    }
</style>
<body>
    <nav>
        <a href="index.html">← Volver a ofertas</a>
    </nav>

    <h1>
        Ficha de Postulación
    </h1>

    <p style="color: rgb(231, 153, 56);">Puesto: Frontend Developer Trainee</p>

    <main>
        <form action="">
            <fieldset>
                <legend style="color: blue;"><b>Datos Personales</b></legend>
                <label for="">Nombre Completo: </label>
                <br>
                <input type="text" placeholder="Tu nombre aquí" required
                    oninvalid="this.setCustomValidity('No olvides tu nombre')"
                    oninput="this.setCustomValidity('')">
                
                <br><br>
                <!--Segundo input-->
                <label for="">Correo Electronico: </label>
                <br>
                <input type="email" placeholder="Tu correo aquí" required
                    oninvalid="this.setCustomValidity('No olvides tu correo')"
                    oninput="this.setCustomValidity('')">

                <br><br>

                <!--Tercer input-->
                <label for="">Teléfono:</label>
                <br>
                <input type="text" placeholder="Tu teléfono aquí" required
                    oninvalid="this.setCustomValidity('No olvides tu teléfono')"
                    oninput="this.setCustomValidity('')">

                <br><br>

                
            </fieldset>

            <!--Segundo fieldset -->
            <fieldset>
                <legend style="color: blue;"><b>Perfil Técnico</b></legend>
                <label for="">Link de GitHub: </label>
                <br>
                <input type="text" placeholder="https: //github.com/usuario" required
                    oninvalid="this.setCustomValidity('No olvides tu nombre')"
                    oninput="this.setCustomValidity('')">
                
                <br><br>
                <!--Lista-->
                <label for="">Nivel de Inglés </label>
                <br>

                <select name="" id="">
                    <option value="">Seleccionar</option>
                    <option value="">Básico</option>
                    <option value="">Intermedio</option>
                    <option value="">Avanzado</option>
                </select>

                <br><br>
                <!--checkbox-->
                <input type="checkbox" ><label for="">HTML</label>
                <input type="checkbox" ><label for="">CSS3</label>
                <input type="checkbox" ><label for="">JavaScript</label>

        </form>
    </main>
    <br>
    <button type="submit"
        style="background-color: #53b63f; 
                    color: white; 
                    border-radius: 10px; 
                    border-color: #53b63f;
                    padding: 10px 25px; 
                    text-align:center; 
                    display: inline-block; 
                    font-size: 14px; 
                    cursor: pointer;">
                   <i class="bi bi-rocket-takeoff"></i> Guardar</button>
</body>
</html>
